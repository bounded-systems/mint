name: release

# On a vX.Y.Z tag (pushed by `mint release`):
#   release  — test, pack, SLSA-attest the tarball, publish the GitHub release
#              (notes from the tag annotation mint wrote).
#   publish  — publish to npm + JSR via OIDC trusted publishing. No tokens, ever:
#              authentication is the workflow's OIDC identity (id-token: write).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write      # create the GitHub release
  id-token: write      # OIDC — SLSA attestation, npm trusted publishing, JSR
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
      - run: npm ci --no-audit --no-fund
      - run: npm test
      - name: Pack the package
        id: pack
        run: echo "tgz=$(npm pack | tail -1)" >> "$GITHUB_OUTPUT"
      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: ${{ steps.pack.outputs.tgz }}
      - name: Publish GitHub release (notes from the tag annotation)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-from-tag "${{ steps.pack.outputs.tgz }}"

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"                       # npm 11+ for OIDC trusted publishing
          registry-url: "https://registry.npmjs.org"
      - run: npm ci --no-audit --no-fund
      - name: Publish to npm (OIDC trusted publishing — no token)
        run: |
          npm install -g npm@latest                # ensure trusted-publishing-capable npm
          npm publish --access public --provenance
      - name: Publish to JSR (OIDC — no token)
        run: npx jsr publish --allow-slow-types
